<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OFF-WHITE STORE</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- TU CSS -->
    <link rel="stylesheet" href="estiloE.css">
</head>

<body>

    <div class="container my-4">
        <h1 class="text-center mb-4">OFF-WHITE STORE</h1>

        <div class="row" id="productos"></div>

        <hr class="my-4">

        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Carrito de compras</h4>
            </div>
            <div class="card-body">
                <div id="carrito"></div>

                <h4>Total: $<span id="total">0.00</span></h4>

                <button class="btn btn-danger w-100 mb-2" onclick="vaciarCarrito()">
                    Vaciar carrito
                </button>

                <button class="btn btn-success w-100" onclick="pagar()">
                    Pagar
                </button>
            </div>
        </div>
    </div>

    <script>
        const productos = [
            { id: 1, nombre: "Tenis Off-White Blancos", precio: 6500, imagen: "tenis1.jpg" },
            { id: 2, nombre: "Tenis Off-White Negros", precio: 6200, imagen: "tenis3.jpg" },
            { id: 3, nombre: "Sudadera Off-White", precio: 4800, imagen: "sudadera 2.jpg" },
            { id: 4, nombre: "Lentes Off-White", precio: 3200, imagen: "LENTES1.jpg" },
            { id: 5, nombre: "Bolsa Off-White", precio: 7500, imagen: "bolsa5.jpg" }
        ];

        let carrito = [];

        function mostrarProductos() {
            const contenedor = document.getElementById("productos");
            contenedor.innerHTML = "";

            productos.forEach(producto => {
                contenedor.innerHTML += `
                <div class="col-md-3 mb-4">
                    <div class="minimal-card shadow-sm">
                        <img src="${producto.imagen}" class="img-producto">
                        
                        <h5 class="mt-3">${producto.nombre}</h5>
                        <p>$${producto.precio.toFixed(2)}</p>

                        <input type="number" id="cantidad-${producto.id}" class="form-control mb-2" value="1" min="1">

                        <button class="btn btn-dark w-100" onclick="agregarCarrito(${producto.id})">
                            Agregar al carrito
                        </button>
                    </div>
                </div>`;
            });
        }

        function agregarCarrito(id) {
            const producto = productos.find(p => p.id === id);
            const cantidad = parseInt(document.getElementById(`cantidad-${id}`).value);

            if (cantidad <= 0 || isNaN(cantidad)) {
                alert("Ingresa una cantidad válida");
                return;
            }

            const existe = carrito.find(item => item.id === id);

            if (existe) {
                existe.cantidad += cantidad;
            } else {
                carrito.push({
                    id: producto.id,
                    nombre: producto.nombre,
                    precio: producto.precio,
                    cantidad: cantidad
                });
            }

            mostrarCarrito();
        }

        function eliminarProducto(id) {
            carrito = carrito.filter(item => item.id !== id);
            mostrarCarrito();
        }

        function mostrarCarrito() {
            const contenedor = document.getElementById("carrito");
            const totalHTML = document.getElementById("total");

            contenedor.innerHTML = "";
            let total = 0;

            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;

                contenedor.innerHTML += `
                <div class="carrito-item d-flex justify-content-between align-items-center">
                    <div>
                        <strong>${item.nombre}</strong><br>
                        Cantidad: ${item.cantidad} | Precio: $${item.precio.toFixed(2)}
                    </div>
                    <div>
                        <span>$${subtotal.toFixed(2)}</span><br>
                        <button onclick="eliminarProducto(${item.id})">Eliminar</button>
                    </div>
                </div>`;
            });

            totalHTML.innerText = total.toFixed(2);
        }

        function vaciarCarrito() {
            carrito = [];
            mostrarCarrito();
        }

        function pagar() {

            if (carrito.length === 0) {
                alert("Tu carrito está vacío");
                return;
            }

            let total = document.getElementById("total").innerText;

            document.getElementById("carrito").innerHTML = `
            <div class="alert alert-success text-center">
                ✅ Compra exitosa <br><br>
                Total pagado: $${total} <br><br>
                Gracias por tu compra en OFF-WHITE
            </div>
            `;

            carrito = [];
            document.getElementById("total").innerText = "0.00";
        }

        mostrarProductos();
    </script>

</body>
</html>
